        // --- Intersection Observer Hook for Elegant Reveals ---
        const useScrollReveal = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('revealed');
                        }
                    });
                }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

                document.querySelectorAll('.reveal-on-scroll').forEach((el) => {
                    observer.observe(el);
                });

                return () => observer.disconnect();
            }, []);
        };

        // --- Neural Canvas Background Component (Parallax Network) ---
        const NeuralCanvas = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                let W = window.innerWidth;
                let H = window.innerHeight;
                canvas.width = W;
                canvas.height = H;
                
                const nodes = [];
                const edges = [];
                const nodeCount = W > 768 ? 60 : 30; // Amount of neural nodes
                
                // Initialize nodes spread across a tall virtual height
                for (let i = 0; i < nodeCount; i++) {
                    nodes.push({
                        bx: Math.random(), // 0 to 1 horizontal
                        by: Math.random() * 4, // 0 to 4 times the screen height
                        z: Math.random(), // Parallax depth
                        baseR: 1.5 + Math.random() * 2,
                        phase: Math.random() * Math.PI * 2,
                        color: Math.random() > 0.5 ? '236, 72, 153' : '249, 115, 22' // Coral/Orange
                    });
                }

                // Initialize Connections (Edges)
                for (let i = 0; i < nodes.length; i++) {
                    let dists = [];
                    for (let j = 0; j < nodes.length; j++) {
                        if (i === j) continue;
                        let dx = nodes[i].bx - nodes[j].bx;
                        let dy = (nodes[i].by - nodes[j].by) * 2.5;
                        dists.push({ j, d: dx*dx + dy*dy });
                    }
                    dists.sort((a, b) => a.d - b.d);
                    for (let n = 0; n < Math.min(2, dists.length); n++) {
                        edges.push({ a: i, b: dists[n].j, flow: Math.random(), speed: 0.002 + Math.random() * 0.003 });
                    }
                }

                let animationFrameId;

                const draw = () => {
                    ctx.clearRect(0, 0, W, H);
                    const scrollY = window.scrollY;
                    const maxScroll = Math.max(1, document.body.scrollHeight - H);
                    const progress = scrollY / maxScroll;
                    
                    // Update node positions based on scroll (Parallax effect)
                    for (let i = 0; i < nodes.length; i++) {
                        let n = nodes[i];
                        let parallax = 0.4 + n.z * 1.5;
                        let worldY = n.by * H * 1.5; 
                        let screenY = worldY - (progress * H * 3 * parallax);
                        
                        // Wrap around vertically to keep the canvas populated
                        const wrapH = H * 2;
                        while (screenY < -H * 0.5) screenY += wrapH;
                        while (screenY > H * 1.5) screenY -= wrapH;
                        
                        let drift = Math.sin(Date.now() * 0.0005 + n.phase) * 20 * n.z;
                        n.rx = n.bx * W + drift;
                        n.ry = screenY;
                        
                        let distCenter = Math.abs(screenY - H * 0.5);
                        let prox = Math.max(0, 1 - distCenter / (H * 0.9));
                        n.r = n.baseR * (0.5 + prox * 0.5);
                        n.op = 0.1 + prox * 0.35;
                    }
                    
                    // Draw edges and energy pulses
                    for (let i = 0; i < edges.length; i++) {
                        let e = edges[i];
                        let na = nodes[e.a], nb = nodes[e.b];
                        let avgOp = (na.op + nb.op) * 0.5;
                        if (avgOp < 0.05) continue;
                        
                        ctx.beginPath();
                        ctx.moveTo(na.rx, na.ry);
                        ctx.lineTo(nb.rx, nb.ry);
                        ctx.strokeStyle = `rgba(236, 72, 153, ${avgOp * 0.3})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                        
                        e.flow = (e.flow + e.speed) % 1;
                        let px = na.rx + (nb.rx - na.rx) * e.flow;
                        let py = na.ry + (nb.ry - na.ry) * e.flow;
                        
                        ctx.beginPath();
                        ctx.arc(px, py, 1.5, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(249, 115, 22, ${avgOp * 0.8})`;
                        ctx.fill();
                    }
                    
                    // Draw node dots
                    for (let i = 0; i < nodes.length; i++) {
                        let n = nodes[i];
                        if (n.op < 0.05) continue;
                        ctx.beginPath();
                        ctx.arc(n.rx, n.ry, n.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${n.color}, ${n.op})`;
                        ctx.fill();
                    }
                    
                    animationFrameId = requestAnimationFrame(draw);
                };

                draw();

                const handleResize = () => {
                    W = window.innerWidth;
                    H = window.innerHeight;
                    canvas.width = W;
                    canvas.height = H;
                };

                window.addEventListener('resize', handleResize);
                
                return () => {
                    window.removeEventListener('resize', handleResize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            return (
                <canvas 
                    ref={canvasRef} 
                    className="fixed top-0 left-0 w-full h-full z-0 pointer-events-none opacity-80"
                />
            );
        };
